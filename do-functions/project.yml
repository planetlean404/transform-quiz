packages:
  - name: scorecard
    functions:
      - name: submit
        runtime: 'nodejs:22'
        web: true
        annotations:
          web-custom-options: true
        limits:
          timeout: 55000
        environment:
          GOOGLE_SHEET_ID: "${GOOGLE_SHEET_ID}"
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: "${GOOGLE_SERVICE_ACCOUNT_JSON_B64}"
          KARTRA_API_KEY: "${KARTRA_API_KEY}"
          KARTRA_API_PASSWORD: "${KARTRA_API_PASSWORD}"
          KARTRA_APP_ID: "${KARTRA_APP_ID}"
          ZEROBOUNCE_API_KEY: "${ZEROBOUNCE_API_KEY}"
          ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      - name: report
        runtime: 'nodejs:22'
        web: true
        annotations:
          web-custom-options: true
        limits:
          timeout: 15000
        environment:
          GOOGLE_SHEET_ID: "${GOOGLE_SHEET_ID}"
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: "${GOOGLE_SERVICE_ACCOUNT_JSON_B64}"
